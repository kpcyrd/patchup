[package]
name = "patchup"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
arc-swap = "1.9.1"
clap = { version = "4", features = ["derive", "env"] }
env_logger = "0.11"
etcetera = "0.11"
log = "0.4"
rand = "0.10"
russh = "0.61"
sd-listen-fds = "0.2.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sysinfo = { version = "0.39", default-features = false, features = ["system"] }
tokio = { version = "1", features = ["fs", "io-std", "macros", "process", "rt-multi-thread"] }
toml = "1"
